<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{TITLE}} — Commently Docs</title>
  <meta name="description" content="{{DESC}}" />
  <link rel="icon" type="image/png" href="../favicon.png" />
  <link rel="apple-touch-icon" href="../favicon.png" />
  <link rel="stylesheet" href="../styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    .docs-layout {
      display: grid;
      grid-template-columns: var(--sidebar-w) 1fr;
      min-height: 100vh;
      padding-top: var(--header-h);
    }
    .docs-sidebar {
      position: sticky; top: var(--header-h);
      height: calc(100vh - var(--header-h));
      overflow-y: auto;
      padding: 24px 16px;
      border-right: 1px solid var(--border);
      background: var(--bg-alt);
    }
    .docs-sidebar h4 {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .1em; color: var(--text-muted); margin: 20px 0 8px;
    }
    .docs-sidebar a {
      display: block; padding: 6px 10px; font-size: 14px;
      color: var(--text-muted); border-radius: 6px;
    }
    .docs-sidebar a:hover { color: var(--brand); background: var(--brand-light); text-decoration: none; }
    .docs-sidebar a.active { color: var(--brand); background: var(--brand-light); font-weight: 600; }
    .docs-content {
      max-width: 760px; padding: 48px 48px 80px;
    }
    .docs-content h1 { font-size: 36px; font-weight: 800; margin-bottom: 16px; }
    .docs-content h2 { font-size: 24px; font-weight: 700; margin: 40px 0 12px; padding-top: 24px; border-top: 1px solid var(--border); }
    .docs-content h3 { font-size: 18px; font-weight: 700; margin: 28px 0 10px; }
    .docs-content h4 { font-size: 15px; font-weight: 700; margin: 20px 0 8px; }
    .docs-content p { font-size: 15px; line-height: 1.8; margin-bottom: 14px; color: #374151; }
    .docs-content ul, .docs-content ol { padding-left: 24px; margin-bottom: 14px; }
    .docs-content li { font-size: 15px; line-height: 1.8; color: #374151; }
    .docs-content table { width: 100%; border-collapse: collapse; margin: 20px 0; font-size: 14px; }
    .docs-content th { background: var(--bg-alt); padding: 10px 14px; text-align: left; font-weight: 600; border: 1px solid var(--border); }
    .docs-content td { padding: 10px 14px; border: 1px solid var(--border); }
    .docs-content blockquote { border-left: 4px solid var(--brand); padding: 12px 20px; background: var(--brand-light); border-radius: 0 8px 8px 0; margin: 16px 0; font-size: 14px; }
    .docs-content hr { border: none; border-top: 1px solid var(--border); margin: 32px 0; }
    .docs-nav { display: flex; justify-content: space-between; margin-top: 48px; padding-top: 24px; border-top: 1px solid var(--border); }
    .docs-nav a { font-size: 14px; font-weight: 600; color: var(--brand); display: flex; align-items: center; gap: 6px; }
    @media (max-width: 768px) {
      .docs-layout { grid-template-columns: 1fr; }
      .docs-sidebar { display: none; }
      .docs-content { padding: 24px 20px; }
    }
  </style>
</head>
<body>

<header class="site-header">
  <a href="../index.html" class="header-logo">
    <img src="../favicon.png" alt="Commently" width="28" height="28" style="border-radius:6px;" />
    <span>Commently</span>
  </a>
  <nav class="header-nav">
    <a href="../index.html#features">Features</a>
    <a href="../index.html#how-it-works">How It Works</a>
    <a href="installation.html">Docs</a>
    <a href="https://github.com/ankitpro/commently" target="_blank" rel="noreferrer">GitHub</a>
    <a href="installation.html" class="header-cta">Get Started →</a>
  </nav>
</header>

<div class="docs-layout">
  <nav class="docs-sidebar">
    <h4>Getting Started</h4>
    <a href="index.html">Overview</a>
    <a href="installation.html">Installation</a>
    <a href="configuration.html">Configuration</a>
    <a href="usage.html">Usage</a>

    <h4>Features</h4>
    <a href="tones.html">Tones</a>
    <a href="local-llm.html">Local LLM</a>

    <h4>Project</h4>
    <a href="contributing.html">Contributing</a>
    <a href="https://github.com/ankitpro/commently/blob/main/LICENSE" target="_blank" rel="noreferrer">License</a>
    <a href="https://github.com/ankitpro/commently/issues" target="_blank" rel="noreferrer">Issues</a>

    <h4 style="margin-top:32px;">Links</h4>
    <a href="https://agent-corex.com" target="_blank" rel="noreferrer">⚡ AgentCoreX</a>
    <a href="https://github.com/ankitpro/commently" target="_blank" rel="noreferrer">⭐ GitHub</a>

    <a href="https://buymeacoffee.com/chillbaba" target="_blank" rel="noreferrer"
       style="display:flex; align-items:center; gap:6px; margin-top:16px; padding:10px 12px; background:#FFDD00; color:#000 !important; border-radius:8px; font-size:13px; font-weight:700; text-align:center; justify-content:center;">
      📚 Buy us a dev book
    </a>
    <p style="font-size:11px; color:var(--text-muted); margin-top:6px; line-height:1.4; padding:0 4px;">
      Help us learn & ship more features for you
    </p>
  </nav>

  <main class="docs-content" id="doc-body">
    {{CONTENT}}
  </main>
</div>

<script>
  // Mark active nav link
  const current = location.pathname.split('/').pop()
  document.querySelectorAll('.docs-sidebar a').forEach(a => {
    if (a.getAttribute('href') === current) a.classList.add('active')
  })
</script>
</body>
</html>
